# ===========================================
# mPAPA — Docker Compose for Coolify
# ===========================================
# mPAPA: my Personal Artificial Patent Attorney
# AI-powered patent drafting with prior art search
#
# Uses OpenRouter as LLM provider (cheap, 300+ models)
# ===========================================

version: "3.8"

services:
  # -------------------------------------------
  # mPAPA — Patent Drafting System
  # -------------------------------------------
  mpapa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpapa
    restart: unless-stopped
    ports:
      - "${MPAPA_PORT:-8080}:8080"
    environment:
      # OpenRouter LLM Backend
      - PATENT_LM_STUDIO_BASE_URL=https://openrouter.ai/api/v1
      - PATENT_LM_STUDIO_API_KEY=${OPENROUTER_API_KEY}

      # Model assignments (using cheap, capable models)
      - PATENT_MODEL_DISCLOSURE=${PATENT_MODEL_DISCLOSURE:-minimax/minimax-m3}
      - PATENT_MODEL_SEARCH=${PATENT_MODEL_SEARCH:-minimax/minimax-m3}
      - PATENT_MODEL_CLAIMS=${PATENT_MODEL_CLAIMS:-minimax/minimax-m3}
      - PATENT_MODEL_DESCRIPTION=${PATENT_MODEL_DESCRIPTION:-minimax/minimax-m3}
      - PATENT_MODEL_REVIEW=${PATENT_MODEL_REVIEW:-minimax/minimax-m3}
      - PATENT_MODEL_CHAT=${PATENT_MODEL_CHAT:-minimax/minimax-m3}

      # Embedding model (OpenRouter doesn't serve embeddings — use a free local fallback)
      - PATENT_EMBEDDING_MODEL_NAME=${PATENT_EMBEDDING_MODEL_NAME:-text-embedding-nomic-embed-text-v1.5}

      # Web UI
      - PATENT_NICEGUI_PORT=8080
      - PATENT_NICEGUI_RELOAD=false

      # Search settings
      - PATENT_SEARCH_MAX_RESULTS_PER_SOURCE=${PATENT_SEARCH_MAX_RESULTS_PER_SOURCE:-10}
      - PATENT_SEARCH_REQUEST_DELAY_SECONDS=${PATENT_SEARCH_REQUEST_DELAY_SECONDS:-3.0}

      # EPO/OPS (optional)
      - PATENT_EPO_OPS_KEY=${PATENT_EPO_OPS_KEY:-}
      - PATENT_EPO_OPS_SECRET=${PATENT_EPO_OPS_SECRET:-}

      # Logging
      - PATENT_LOG_LEVEL=${PATENT_LOG_LEVEL:-INFO}

      # Database & storage
      - PATENT_DATABASE_PATH=data/patent_system.db
      - PATENT_PDF_DOWNLOAD_DIR=data/pdfs
      - PATENT_LOG_FILE_PATH=logs/patent_system.log
    volumes:
      - mpapa_data:/app/data
      - mpapa_logs:/app/logs
    networks:
      - mpapa_net

# -------------------------------------------
# Volumes
# -------------------------------------------
volumes:
  mpapa_data:
    driver: local
  mpapa_logs:
    driver: local

# -------------------------------------------
# Network
# -------------------------------------------
networks:
  mpapa_net:
    driver: bridge
